<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roata Norocului DE</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Roata Norocului DE home">
        <span class="brand-mark">DE</span>
        <span>Roata Norocului</span>
      </a>
      <nav class="nav">
        <a data-i18n="navGame" aria-current="page" href="index.html">Game</a>
        <a data-i18n="navConfigure" href="config.html">Configure</a>
        <label class="language-switch">
          <span data-i18n="languageLabel">Language</span>
          <select id="languageSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
          </select>
        </label>
      </nav>
    </header>

    <main class="game-shell">
      <section class="stage" aria-labelledby="game-title">
        <div class="stage-copy">
          <p class="eyebrow" data-i18n="gameEyebrow">German practice wheel</p>
          <h1 id="game-title" data-i18n="gameTitle">Spin, answer, score, repeat.</h1>
        </div>

        <div class="wheel-layout">
          <div class="wheel-wrap" aria-live="polite">
            <div class="pointer" aria-hidden="true"></div>
            <div id="wheel" class="wheel" role="img" aria-label="Spinning category wheel"></div>
          </div>

          <aside class="play-panel" aria-label="Game controls">
            <div class="setup-grid">
              <label>
                <span data-i18n="playerCount">Number of players</span>
                <select id="playerCount">
                  <option value="1">1</option>
                  <option value="2" selected>2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </label>
              <label>
                <span data-i18n="rounds">Rounds</span>
                <select id="roundLimit">
                  <option value="10" data-i18n="rounds10">10 rounds</option>
                  <option value="20" data-i18n="rounds20">20 rounds</option>
                  <option value="30" data-i18n="rounds30">30 rounds</option>
                </select>
              </label>
            </div>
            <p class="player-names-heading" data-i18n="playerNames">Player names</p>
            <div id="playerNameFields" class="player-name-fields"></div>
            <div class="button-row">
              <button id="spinButton" class="primary-action" type="button" data-i18n="start">Start</button>
              <button id="newGameButton" class="secondary-action" type="button" data-i18n="newGame">New Game</button>
              <button id="resetScoresButton" class="ghost-action" type="button" data-i18n="resetScores">Reset Scores</button>
            </div>

            <div class="status-strip">
              <div>
                <span data-i18n="turn">Turn</span>
                <strong id="turnLabel">-</strong>
              </div>
              <div>
                <span data-i18n="round">Round</span>
                <strong id="roundLabel">0 / 10</strong>
              </div>
            </div>

            <section class="question-box" aria-labelledby="question-title">
              <p id="categoryLabel" class="category-pill">Spin to choose</p>
              <h2 id="question-title" data-i18n="question">Question</h2>
              <p id="questionText">Add players, choose the round count, then press Start.</p>
              <button id="showExampleButton" class="ghost-action example-action" type="button" data-i18n="showExample">Show example</button>
              <p id="answerText" class="answer-text"></p>
            </section>

            <section aria-labelledby="score-title">
              <h2 id="score-title" class="compact-title" data-i18n="scoreAnswer">Score this answer</h2>
              <div class="score-buttons">
                <button type="button" data-points="0">0</button>
                <button type="button" data-points="10">10</button>
                <button type="button" data-points="30">30</button>
                <button type="button" data-points="45">45</button>
              </div>
            </section>
          </aside>
        </div>
      </section>

      <section class="scoreboard-section" aria-labelledby="leaderboard-title">
        <h2 id="leaderboard-title" data-i18n="players">Players</h2>
        <div id="scoreboard" class="scoreboard"></div>
      </section>
    </main>

    <div id="celebrationOverlay" class="celebration-overlay" aria-hidden="true">
      <div class="fireworks" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <section class="winner-dialog" role="dialog" aria-labelledby="winnerTitle" aria-modal="true">
        <p class="eyebrow" data-i18n="winnerEyebrow">Winner</p>
        <h2 id="winnerTitle"></h2>
        <p id="winnerSubtitle"></p>
        <button id="closeCelebrationButton" class="primary-action" type="button" data-i18n="closeCelebration">Close</button>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
